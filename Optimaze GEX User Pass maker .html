<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GEX USER PASS MAKER · Ramadan Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace, system-ui;
        }

        body {
            min-height: 100vh;
            background: #0a0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .app-title {
            text-align: center;
            margin-bottom: 15px;
        }

        .app-title h1 {
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            font-weight: 800;
            color: #fbbf24;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
            display: inline-block;
            padding: 0 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
        }

        .app-title h1::before,
        .app-title h1::after {
            content: '⚡';
            display: inline-block;
            margin: 0 8px;
            color: #60a5fa;
        }

        .panel {
            background: rgba(10, 15, 26, 0.95);
            border-radius: 30px;
            padding: 18px 15px 20px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .content-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            padding: 15px 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-line {
            background: rgba(37, 99, 235, 0.3);
            color: white;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            margin-bottom: 15px;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-line {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            font-size: clamp(1rem, 4vw, 1.3rem);
            background: rgba(37, 99, 235, 0.2);
            padding: 10px 15px;
            border-radius: 40px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .pass-line {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            font-size: clamp(1rem, 4vw, 1.3rem);
            background: rgba(219, 39, 119, 0.2);
            padding: 10px 15px;
            border-radius: 40px;
            border: 1px solid rgba(236, 72, 153, 0.3);
        }

        .label {
            color: rgba(255, 255, 255, 0.9);
            min-width: 100px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .value {
            color: white;
            font-weight: bold;
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            word-break: break-word;
            flex: 1;
            text-align: center;
        }

        .separator {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            margin: 15px 0;
            text-align: center;
            letter-spacing: 2px;
        }

        .warning-box {
            background: rgba(251, 191, 36, 0.15);
            border-left: 6px solid #fbbf24;
            padding: 12px 15px;
            border-radius: 20px;
            color: #fef3c7;
            font-weight: 600;
            font-size: clamp(0.95rem, 3.8vw, 1.1rem);
            margin: 18px 0;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .next-pass {
            background: rgba(168, 85, 247, 0.15);
            padding: 12px 15px;
            border-radius: 30px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            border: 1px solid rgba(192, 132, 252, 0.3);
        }

        .next-label {
            color: #e9d5ff;
            font-size: clamp(0.95rem, 3.8vw, 1.1rem);
        }

        .next-date {
            background: rgba(192, 132, 252, 0.2);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: clamp(0.95rem, 3.8vw, 1.1rem);
            border: 1px solid #c084fc;
        }

        .status-box {
            background: rgba(244, 114, 182, 0.15);
            color: #fce7f3;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: 600;
            font-size: clamp(1rem, 4.5vw, 1.2rem);
            border: 1px solid rgba(244, 114, 182, 0.3);
            margin: 12px 0;
        }

        .hashtags {
            background: rgba(255, 255, 255, 0.05);
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            margin: 18px 0 12px;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
        }

        .hashtags span {
            color: #94a3b8;
        }

        .button-section {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .generate-btn, .copy-btn {
            flex: 1 1 auto;
            min-width: 140px;
            padding: 14px 16px;
            border: none;
            border-radius: 50px;
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            font-weight: 600;
            cursor: pointer;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .generate-btn {
            background: #2563eb;
        }

        .copy-btn {
            background: #db2777;
        }

        .generate-btn:active, .copy-btn:active {
            opacity: 0.7;
        }

        .copy-success {
            background: #16a34a !important;
        }

        /* মোবাইল */
        @media (max-width: 480px) {
            .panel {
                padding: 12px 10px;
            }
            
            .user-line, .pass-line {
                flex-direction: column;
                text-align: center;
            }
            
            .label {
                min-width: auto;
            }
            
            .value {
                width: 100%;
            }
            
            .next-pass {
                flex-direction: column;
            }
            
            .button-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-title">
            <h1>GEX USER PASS MAKER</h1>
        </div>

        <div class="panel">
            <div class="content-box">
                <!-- DATE LINE - এখন March/03/26 ফরম্যাটে -->
                <div class="header-line">
                    ​[ DATE : <span id="currentDate">March/03/26</span> ] 📅
                </div>
                
                <div class="user-line">
                    <span class="label">👤 [USER_ID] :</span>
                    <span class="value" id="userId"></span>
                </div>
                
                <div class="pass-line">
                    <span class="label">🔑 [PASS_KEY] :</span>
                    <span class="value" id="passKey"></span>
                </div>
                
                <div class="separator">----------------------------------------</div>
                
                <div class="warning-box">
                    ​⚠️ #..PASSWORD Will Be Changed At 09:00 PM Everyday.. # ⚠️
                </div>
                
                <div class="next-pass">
                    <span class="next-label">Next User Pass Available On:</span>
                    <span class="next-date" id="nextPass">April 4, 2026 at 9:00 PM</span>
                </div>
                
                <div class="status-box">
                    ​STATUS : [ ACTIVE ] 🟢
                </div>
                
                <div class="hashtags">
                    <span># ⚡ LIFE_TIME_FREE_PANEL</span>
                    <span>@everyone</span>
                    <span>@here</span>
                </div>
            </div>
        </div>
        
        <div class="button-section">
            <button class="generate-btn" id="generateBtn">⟳ GENERATE</button>
            <button class="copy-btn" id="copyBtn">📋 COPY</button>
        </div>
        
        <!-- সিম্পল হিডেন এলিমেন্ট - শুধু কপির জন্য -->
        <div style="position: fixed; left: -9999px; top: 0;">
            <div id="copySource"></div>
        </div>
    </div>

    <script>
    (function() {
        // ========== ডেট ফরম্যাট ==========
        function getFormattedDate() {
            const today = new Date();
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"];
            const month = monthNames[today.getMonth()];
            const day = String(today.getDate()).padStart(2, '0');
            const year = String(today.getFullYear()).slice(-2);
            return `${month}/${day}/${year}`;  // March/03/26 ফরম্যাট
        }
        
        // আগামীকাল
        function getTomorrowFormatted() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"];
            const month = monthNames[tomorrow.getMonth()];
            const day = tomorrow.getDate();
            const year = tomorrow.getFullYear();
            
            return `${month} ${day}, ${year} at 9:00 PM`;
        }
        
        // ইউজার আইডি
        function randomUserId() {
            const words = ["Mars", "Venus", "Jupiter", "Saturn", "Sword", "Shield", "Arrow", "Crown", "Diamond", "Spear"];
            const randomWord = words[Math.floor(Math.random() * words.length)];
            const number = Math.floor(Math.random() * 900) + 100;
            return randomWord + "_" + number;
        }
        
        // পাসওয়ার্ড
        function randomPassKey() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let password = '';
            for (let i = 0; i < 10; i++) {
                password += chars[Math.floor(Math.random() * chars.length)];
            }
            return password;
        }
        
        // সব ফিল্ড আপডেট
        function updateAllFields() {
            document.getElementById('currentDate').textContent = getFormattedDate();
            document.getElementById('userId').textContent = randomUserId();
            document.getElementById('passKey').textContent = randomPassKey();
            document.getElementById('nextPass').textContent = getTomorrowFormatted();
        }
        
        // ========== সিম্পল কপি ফাংশন ==========
        function copyToClipboard() {
            const currentDate = document.getElementById('currentDate').textContent;
            const userId = document.getElementById('userId').textContent;
            const passKey = document.getElementById('passKey').textContent;
            const nextPass = document.getElementById('nextPass').textContent;
            
            // কপি করার টেক্সট
            const textToCopy = `[ DATE : ${currentDate} ] 📅
👤 [USER_ID] : ${userId}
🔑 [PASS_KEY] : ${passKey}
--------------------------------------------------------
⚠️ #..PASSWORD Will Be Changed At 09:00 PM Everyday.. # ⚠️

Next User Pass Available On: ${nextPass}

STATUS : [ ACTIVE ] 🟢

# ⚡ LIFE_TIME_FREE_PANEL

@everyone @here`;
            
            const copyBtn = document.getElementById('copyBtn');
            const originalText = copyBtn.textContent;
            
            // টেম্পোরারি এলিমেন্ট তৈরি
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            textarea.style.left = '0';
            textarea.style.top = '0';
            textarea.style.width = '100px';
            textarea.style.height = '100px';
            textarea.style.zIndex = '9999';
            
            document.body.appendChild(textarea);
            
            // ফোকাস + সিলেক্ট
            textarea.focus();
            textarea.select();
            textarea.setSelectionRange(0, 999999);
            
            // কপি কমান্ড এক্সিকিউট
            let success = false;
            try {
                success = document.execCommand('copy');
            } catch (err) {
                console.log('Copy error:', err);
            }
            
            // টেম্পোরারি এলিমেন্ট সরিয়ে ফেলা
            document.body.removeChild(textarea);
            
            // রেজাল্ট দেখানো
            if (success) {
                copyBtn.textContent = '✓ COPIED!';
                copyBtn.classList.add('copy-success');
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.classList.remove('copy-success');
                }, 2000);
            } else {
                // ম্যানুয়াল কপি
                alert('কপি করতে নিচের টেক্সট সিলেক্ট করে কপি করুন:\n\n' + textToCopy);
            }
        }
        
        // ইনিশিয়াল সেটআপ
        document.getElementById('currentDate').textContent = getFormattedDate();
        document.getElementById('userId').textContent = randomUserId();
        document.getElementById('passKey').textContent = randomPassKey();
        document.getElementById('nextPass').textContent = getTomorrowFormatted();
        
        // ইভেন্ট লিসেনার - সিম্পল
        document.getElementById('generateBtn').onclick = function() {
            updateAllFields();
        };
        
        document.getElementById('copyBtn').onclick = function() {
            copyToClipboard();
            return false;
        };
        
        // টাচ ইভেন্ট
        document.getElementById('copyBtn').ontouchstart = function(e) {
            e.preventDefault();
            copyToClipboard();
        };
        
    })();
    </script>
</body>
</html>
